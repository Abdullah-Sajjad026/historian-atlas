# CI: typecheck, unit tests, then the full pipeline against a real postgres —
# migrate, seed, build. Every step here has been exercised locally; the seed
# doubles as an integration test of the schema (its time-slice smoke query
# fails loudly if the generated range columns are broken).

name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  # This job runs entirely against its own throwaway postgres service below —
  # CI never touches production. Neon/Vercel credentials (DATABASE_URL,
  # DIRECT_DATABASE_URL) are not configured here and must never be: the prod
  # bootstrap is a manual, from-your-machine step (docs/deploy.md).
  test-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: historian
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d historian"
          --health-interval 3s --health-timeout 3s --health-retries 15
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/historian
    steps:
      - uses: actions/checkout@v4
      # pnpm is the package manager (pnpm-lock.yaml is the only lockfile) —
      # setup-node's npm cache mode hard-fails without a package-lock.json.
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npx tsc --noEmit
      - run: npx vitest run
      - run: npm run bootstrap # migrate + seed = schema integration test
      - run: npx next build
